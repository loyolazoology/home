<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --blue:#23365D; --maroon:#6C232E; --gold:#D4A64A; --white:#FFF; --bg:#F4F6F9; }
body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:transparent; font-family:'Poppins', sans-serif; }

.connect-container { 
    background:var(--white); 
    width: fit-content; 
    padding: clamp(10px, 3vw, 15px) clamp(15px, 5vw, 25px); 
    border-radius: 15px; 
    box-shadow: 0 10px 30px rgba(35,54,93,0.1); 
    border-top: 4px solid var(--maroon); 
    text-align: center; 
}

.title { font-family:'Playfair Display', serif; font-size: clamp(14px, 4vw, 16px); color:var(--blue); margin-bottom: 12px; line-height: 1.1; text-transform: capitalize; }
.title::after { content:''; display:block; width:20px; height:2px; background:var(--gold); margin:5px auto 0; }

.social-list { display:flex; flex-direction:row; gap: clamp(12px, 4vw, 25px); align-items:center; justify-content:center; }

.social-item { text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:4px; transition:0.3s; }

.icon-box { 
    width: clamp(32px, 10vw, 40px); 
    height: clamp(32px, 10vw, 40px); 
    background:var(--bg); 
    border-radius: 8px; 
    display:flex; align-items:center; justify-content:center; 
    font-size: clamp(18px, 5vw, 22px); 
    color:var(--blue); 
    transition:0.3s; 
}

.social-label { font-size: clamp(9px, 2.5vw, 11px); font-weight:600; color:#777; text-transform:uppercase; letter-spacing:0.3px; }

/* Mobile Specific Compaction */
@media (max-width: 480px) {
    .connect-container { padding: 10px 15px; }
    .social-list { gap: 10px; }
    .icon-box { border-radius: 6px; }
}

/* Hovers */
.social-item:hover .icon-box { transform:translateY(-3px); color:var(--white); }
.social-item.youtube:hover .icon-box { background:#F00; }
.social-item.whatsapp:hover .icon-box { background:#25D366; }
.social-item.email:hover .icon-box { background:#0078D4; }
.social-item.instagram:hover .icon-box { 
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
}
</style>
</head>
<body>

<div class="connect-container">
  <div class="title">Connect With Us</div>
  <div class="social-list">
    <a href="mailto:zendna1994@gmail.com" class="social-item email">
      <div class="icon-box"><i class="fas fa-envelope"></i></div>
      <div class="social-label">Email</div>
    </a>
    <a href="https://youtube.com/@vprbiotalks?si=V_8jaa9ZSkEv67PP" target="_blank" class="social-item youtube">
      <div class="icon-box"><i class="fab fa-youtube"></i></div>
      <div class="social-label">YouTube</div>
    </a>
     <a href="https://www.instagram.com/zalc_loyola" target="_blank" class="social-item instagram">
      <div class="icon-box"><i class="fab fa-instagram"></i></div>
      <div class="social-label">Insta</div>
    </a>
    <a href="https://www.whatsapp.com/channel/0029VbCWVOfI7Be8qmrza50n" target="_blank" class="social-item whatsapp">
      <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
      <div class="social-label">Channel</div>
    </a>
  </div>
</div>

</body>
</html>
