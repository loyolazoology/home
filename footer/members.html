<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN - DNA | Credits</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --zen-blue: #23365D;
    --zen-maroon: #6C232E;
    --zen-gold: #D4A64A;
    --zen-white: #FFFFFF;
    --zen-bg: #F8FAFC;
    --card-shadow: 0 20px 50px rgba(35, 54, 93, 0.12);
}

body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: transparent;
    font-family: 'Poppins', sans-serif;
    padding: 20px;
}

.credits-card {
    background: var(--zen-white);
    width: 100%;
    max-width: 400px;
    padding: clamp(25px, 5vw, 35px);
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    /* Moved border from top to left side */
    border-left: 8px solid var(--zen-maroon);
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
}

/* Academic watermark moved to top right */
.credits-card::before {
    content: '\f19d';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    top: -15px; /* Positioned at top */
    right: -10px; /* Positioned at right */
    font-size: 100px;
    color: rgba(35, 54, 93, 0.03);
    z-index: 0;
    transform: rotate(15deg);
    pointer-events: none;
}

.section {
    position: relative;
    z-index: 1;
    margin-bottom: 25px;
}

.section:last-child {
    margin-bottom: 0;
}

.label {
    font-size: 10px;
    font-weight: 700;
    color: var(--zen-gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, #eee, transparent);
}

.content-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(17px, 4vw, 19px);
    color: var(--zen-blue);
    line-height: 1.3;
    margin-bottom: 4px;
    font-weight: 700;
}

.content-sub {
    font-size: 12px;
    color: #64748b;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}

.student-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
}

.id-badge {
    background: var(--zen-bg);
    color: var(--zen-blue);
    border: 1px solid #e2e8f0;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
}

.student-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--zen-maroon);
}

@media (max-width: 360px) {
    .credits-card { padding: 20px; }
}
</style>
</head>
<body>

<div class="credits-card">
    <!-- Academic Guidance -->
    <div class="section">
        <div class="label">Academic Guidance</div>
        <div class="content-title">Dr. V. Pushpa Rani</div>
        <div class="content-sub"><i class="fa-solid fa-user-tie"></i>Head of the Department,<br>Department of Advanced Zoology and Biotechechnology</div>
    </div>

    <!-- Creator -->
    <div class="section">
        <div class="label">Creator & Architect</div>
        <div class="content-title">Mr. Mounish D</div>
        <div class="student-info">
            <span class="id-badge">25-UAZ-016</span>
            <span class="student-tag"><i class="fa-solid fa-user-graduate"></i> Student</span>
        </div>
    </div>

    <!-- Technical -->
    <div class="section">
        <div class="label">Technical Lead</div>
        <div class="content-title">Mr. Jackwin S</div>
        <div class="student-info">
            <span class="id-badge">25-UAZ-014</span>
            <span class="student-tag"><i class="fa-solid fa-user-graduate"></i> Student</span>
        </div>
    </div>

    <!-- Review -->
    <div class="section">
        <div class="label">Review & Quality Check</div>
        <div class="content-title">Ms. Bhawanthi Shrinithi R</div>
        <div class="student-info">
            <span class="id-badge">25-UAZ-027</span>
            <span class="student-tag"><i class="fa-solid fa-user-graduate"></i> Student</span>
        </div>
    </div>
</div>

</body>
</html>
