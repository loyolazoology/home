<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZEN-DNA | Responsive Announcements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A;
            --zen-white: #FFFFFF; --zen-text: #2D2D2D;
        }

        body { margin: 0; background: transparent; font-family: 'Poppins', sans-serif; }

        /* FULLY RESPONSIVE CONTAINER */
        .zen-section {
            background: var(--zen-white); 
            border-top: 4px solid var(--zen-maroon);
            padding: clamp(10px, 3vw, 20px); 
            width: 100%; 
            max-width: 800px; 
            margin: auto;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(35, 54, 93, 0.1); 
            border-radius: 15px; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
        }

        .zen-title {
            font-family: 'Playfair Display', serif; 
            font-size: clamp(18px, 4.5vw, 24px);
            color: var(--zen-blue); 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1.5px solid #F0F0F0; 
            padding-bottom: 10px;
        }
        .zen-title i { color: var(--zen-gold); margin-right: 12px; font-size: 0.9em; }

        /* SCROLL AREA */
        .zen-container { 
            height: clamp(250px, 60vh, 350px); 
            overflow-y: auto; 
            overflow-x: hidden; 
            position: relative; 
        }

        /* ZEN SCROLLBAR */
        .zen-container::-webkit-scrollbar { width: 4px; }
        .zen-container::-webkit-scrollbar-thumb { background: var(--zen-blue); border-radius: 10px; }

        .news-item { padding: 12px 4px; border-bottom: 1px solid #F0F0F0; }
        
        .info-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-bottom: 8px; 
        }

        .news-date, .news-label { 
            font-size: clamp(9px, 2vw, 10px); 
            font-weight: 700; 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 4px; 
            text-transform: uppercase; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
        }
        .news-date { background: var(--zen-blue); }
        .news-label { background: #E9ECEF; color: var(--zen-blue); }

        .news-heading { 
            font-size: clamp(14px, 3.8vw, 17px); 
            color: var(--zen-blue); 
            font-weight: 600; 
            display: block; 
            line-height: 1.4; 
            margin-bottom: 5px; 
        }
        
        .news-desc { 
            font-size: clamp(11.5px, 3.2vw, 13.5px); 
            color: #555; 
            line-height: 1.6; 
            margin-bottom: 10px;
        }

        /* ATTACHMENT BUTTON (LIKE ACHIEVEMENTS) */
        .attach-link { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            background: var(--zen-blue); 
            color: #fff; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 5px; 
            font-size: 11px; 
            font-weight: 500; 
            transition: 0.3s; 
        }
        .attach-link:hover { background: var(--zen-maroon); transform: translateY(-1px); }

        /* STICKY HIGHLIGHT DESIGN */
        .important-wrapper { background: #F4F6F9; border-radius: 10px; padding: 5px 12px; margin-bottom: 15px; border-left: 4px solid var(--zen-maroon); position: sticky; top: 0; z-index: 5; }


        /* PORTAL BUTTON */
        .zen-btn-wrap { margin-top: 20px; text-align: center; }
        .zen-btn { 
            background: var(--zen-blue); 
            color: #fff; 
            text-decoration: none; 
            padding: clamp(8px, 2vw, 12px) clamp(15px, 4vw, 25px); 
            border-radius: 8px; 
            font-size: clamp(11px, 2.5vw, 13px); 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.3s ease; 
        }
        .zen-btn:hover { background: var(--zen-maroon); transform: translateY(-2px); }

        /* AUTO SCROLL ANIMATION */
        @keyframes scrollZen { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .scroll-active { animation: scrollZen 50s linear infinite; }
        .zen-container:hover .scroll-active { animation-play-state: paused; }

        .skeleton { height: 80px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px; margin-bottom: 10px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="zen-section">
    <div class="zen-title"><i class="fa-solid fa-bullhorn"></i> Announcements</div>
    <div class="zen-container" id="newsViewport">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
    <div class="zen-btn-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/announcement-portal" target="_blank" class="zen-btn">
            Announcement Portal <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3BhuYxngzXTFssQ6lteUEYUpdfbdGs1bhLkEX3_SAqHpC3wKOQfbmb47tEoTBVdC9EXa8t2kl01qM/pub?gid=0&single=true&output=csv";

function parseDate(d) {
    if(!d) return new Date(0);
    const parts = d.split("-");
    return new Date(parts[2], parts[1] - 1, parts[0]);
}

function formatDate(d) {
    return parseDate(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function processText(text) {
    if (!text) return "";
    return text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
}

fetch(CSV_URL).then(res => res.text()).then(data => {
    const rows = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
    const now = new Date();
    const viewport = document.getElementById("newsViewport");
    viewport.innerHTML = '<div id="impNews"></div><div id="normNews" class="news-scroll-inner"></div>';
    
    const impArea = document.getElementById("impNews");
    const normArea = document.getElementById("normNews");
    let newsList = [];

    rows.forEach(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
        const [from, to, title, desc, attach, imp, lab] = cols;
        if (!from || !title) return;
        const fDate = parseDate(from);
        const tDate = to ? parseDate(to) : new Date(now.getFullYear() + 1, 0, 1);

        if (now >= fDate && now <= tDate) {
            newsList.push({ 
                from, fDate, title, desc, attach, lab: lab || "", 
                isImp: imp && imp.toUpperCase() === "YES" 
            });
        }
    });

    newsList.sort((a, b) => b.fDate - a.fDate).forEach(info => {
        const item = document.createElement("div");
        item.className = "news-item";
        
        let html = `
            <div class="info-row">
                <span class="news-date"><i class="fa-solid fa-calendar-day"></i> ${formatDate(info.from)}</span>
                ${info.lab ? `<span class="news-label"><i class="fa-solid fa-tag"></i> ${info.lab}</span>` : ""}
            </div>
            <div class="news-heading">${processText(info.title)}</div>
            <div class="news-desc">${processText(info.desc)}</div>
            ${(info.attach && info.attach.startsWith('http')) ? `<a class="attach-link" href="${info.attach}" target="_blank"><i class="fa-solid fa-paperclip"></i> View Attachment</a>` : ""}`;
        
        item.innerHTML = html;

        if (info.isImp) {
            const wrap = document.createElement("div"); 
            wrap.className = "important-wrapper";
            wrap.appendChild(item); 
            impArea.appendChild(wrap);
        } else { 
            normArea.appendChild(item); 
        }
    });

    setTimeout(() => {
        const area = document.getElementById("normNews");
        if (area.scrollHeight > viewport.offsetHeight) {
            area.innerHTML += area.innerHTML;
            area.classList.add("scroll-active");
        }
    }, 600);
});
</script>
</body>
</html>
