<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AZ-BT | Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azbt-blue: #23365D; --azbt-maroon: #6C232E; --azbt-gold: #D4A64A;
            --azbt-white: #FFFFFF; --azbt-text: #2D2D2D;
        }

        body { 
            margin: 0; 
            background: transparent; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .azbt-section {
            background: var(--azbt-white); 
            border-top: 4px solid var(--azbt-maroon);
            padding: 15px; 
            width: 95%; 
            max-width: 800px; 
            margin: auto;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            border-radius: 15px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            /* Adaptive Height */
            height: clamp(350px, 95vh, 650px);
        }

        .azbt-title {
            font-family: 'Playfair Display', serif; 
            font-size: clamp(18px, 4vw, 24px);
            color: var(--azbt-blue); 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1.5px solid #F0F0F0; 
            padding-bottom: 10px;
            flex-shrink: 0;
        }
        .azbt-title i { color: var(--azbt-gold); margin-right: 12px; font-size: 20px; }

        .azbt-container { 
            flex-grow: 1; /* Takes up all available space between title and button */
            overflow-y: auto; 
            overflow-x: hidden; 
            position: relative; 
            display: block; 
        }

        .azbt-container::-webkit-scrollbar { width: 4px; }
        .azbt-container::-webkit-scrollbar-thumb { background: var(--azbt-blue); border-radius: 10px; }

        .no-data-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        .no-data-icon { font-size: 3rem; color: var(--azbt-gold); margin-bottom: 15px; opacity: 0.8; }
        .no-data-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--azbt-blue); margin-bottom: 8px; font-weight: 700; }
        .no-data-msg { font-size: 13px; color: #666; line-height: 1.5; max-width: 280px; }
        .portal-hint { margin-top: 12px; font-weight: 600; color: var(--azbt-maroon); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        .ach-item { padding: 15px 5px; border-bottom: 1px solid #F0F0F0; }
        .ach-info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }

        .ach-date { font-size: 10px; font-weight: 700; background: var(--azbt-blue); color: #fff; padding: 3px 10px; border-radius: 4px; }
        .ach-category { font-size: 10px; font-weight: 700; background: #E9ECEF; color: var(--azbt-blue); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }

        .ach-heading { font-size: clamp(14px, 3.5vw, 16px); color: var(--azbt-blue); font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .ach-desc { font-size: clamp(11.5px, 3vw, 13px); color: #555; line-height: 1.5; margin-bottom: 8px; }

        .ach-link { display: inline-flex; align-items: center; gap: 6px; background: var(--azbt-blue); color: #fff; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 11px; font-weight: 500; transition: 0.3s; }
        .ach-link:hover { background: var(--azbt-maroon); }

        .important-wrapper { 
            background: linear-gradient(to right, #FFF9F0, #FFFFFF); border-radius: 10px; border: 1px solid #FFE6B3; 
            border-left: 4px solid var(--azbt-gold); padding: 8px 12px; margin-bottom: 15px; position: sticky; top: 0; z-index: 5; 
            box-shadow: 0 4px 12px rgba(212, 166, 74, 0.15);
        }

        /* Fixed Button at Bottom */
        .azbt-btn-wrap { 
            margin-top: auto; 
            text-align: center; 
            padding: 10px 0 5px 0; 
            flex-shrink: 0;
            border-top: 1px solid #F0F0F0;
        }
        .azbt-btn { background: var(--azbt-blue); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .azbt-btn:hover { background: var(--azbt-gold); color: var(--azbt-blue); }

        @keyframes scrollAch { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .scroll-active { animation: scrollAch 50s linear infinite; }
        .azbt-container:hover .scroll-active { animation-play-state: paused; }

        .skeleton { height: 80px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px; margin-bottom: 10px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="azbt-section">
    <div class="azbt-title"><i class="fa-solid fa-trophy"></i> Achievements</div>
    
    <div class="azbt-container" id="achViewport">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="azbt-btn-wrap">
        <a href="https://loyolazoology.wixsite.com/az-bt/achievements-portal" target="_blank" class="azbt-btn">
            Achievements Portal <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhak6CKqjDSP4kcJGoLGQsFwhpa6nxR0DKMzxSbTlbbfZknIkMtp6uUfuLoWHpcU6Xr5AtODMlf4JV/pub?gid=0&single=true&output=csv";

function parseDate(d) {
    if(!d) return new Date(0);
    const [dd, mm, yyyy] = d.split("-");
    return new Date(yyyy, mm - 1, dd);
}

function formatDate(d) {
    return parseDate(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function processText(text) {
    if (!text) return "";
    return text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
}

fetch(CSV_URL).then(res => res.text()).then(data => {
    const rows = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
    const now = new Date();
    const viewport = document.getElementById("achViewport");
    
    let achList = [];

    rows.forEach(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
        const [from, to, title, description, category, link, highlight] = cols;
        if (!from || !title) return;
        const fDate = parseDate(from);
        const tDate = to ? parseDate(to) : new Date(now.getFullYear() + 1, 0, 1);

        if (now >= fDate && now <= tDate) {
            achList.push({ from, fDate, title, description, category, link, isImp: highlight && highlight.toUpperCase() === "YES" });
        }
    });

    if (achList.length === 0) {
        viewport.innerHTML = `
            <div class="no-data-container">
                <div class="no-data-icon"><i class="fa-solid fa-medal"></i></div>
                <div class="no-data-title">No Recent Achievements</div>
                <div class="no-data-msg">Stay tuned! We are constantly scaling new heights and celebrating success.</div>
                <div class="portal-hint">Visit portal for older achievements</div>
            </div>`;
    } else {
        viewport.innerHTML = '<div id="importantArea"></div><div id="normalArea" class="ach-scroll-inner"></div>';
        const impArea = document.getElementById("importantArea");
        const normArea = document.getElementById("normalArea");

        achList.sort((a, b) => b.fDate - a.fDate).forEach(info => {
            const item = document.createElement("div");
            item.className = "ach-item";
            item.innerHTML = `
                <div class="ach-info-row">
                    <span class="ach-date"><i class="fa-solid fa-calendar-day"></i> ${formatDate(info.from)}</span>
                    ${info.category ? `<span class="ach-category"><i class="fa-solid fa-tag"></i> ${info.category}</span>` : ""}
                </div>
                <div class="ach-heading">${processText(info.title)}</div>
                <div class="ach-desc">${processText(info.description)}</div>
                ${info.link ? `<a class="ach-link" href="${info.link}" target="_blank"><i class="fa-solid fa-paperclip"></i> View Achievement</a>` : ""}`;

            if (info.isImp) {
                const wrap = document.createElement("div"); wrap.className = "important-wrapper";
                wrap.appendChild(item); impArea.appendChild(wrap);
            } else { normArea.appendChild(item); }
        });

        setTimeout(() => {
            const area = document.getElementById("normalArea");
            if (area.offsetHeight > viewport.offsetHeight) {
                area.innerHTML += area.innerHTML;
                area.classList.add("scroll-active");
            }
        }, 400);
    }
});
</script>
</body>
</html>
