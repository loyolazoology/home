<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ-BT | Academic Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --azbt-blue: #23365D; --azbt-maroon: #6C232E; --azbt-gold: #D4A64A; --azbt-light: #F4F6F9; --white: #FFFFFF; }
        
        body { 
            margin: 0; background: transparent; font-family: 'Poppins', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* FULLY RESPONSIVE CONTAINER */
        .container { 
            width: 95%; 
            max-width: 900px; 
            margin: auto; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            /* Adaptive Height based on screen */
            height: clamp(500px, 95vh, 850px);
            padding: 10px 0;
            box-sizing: border-box;
        }

        /* CENTERED TITLE WITH LINE BELOW - MATCHING MODEL */
        .title-wrap { flex-shrink: 0; margin-bottom: 10px; position: relative; }
        h1.main-heading { 
            font-family: 'Playfair Display', serif; 
            color: var(--azbt-blue); 
            margin: 0; 
            font-size: clamp(1.2rem, 5vw, 1.6rem); 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .title-wrap::after { 
            content: ''; 
            display: block; 
            width: 40px; 
            height: 3px; 
            background: var(--azbt-maroon); 
            margin: 8px auto 0; 
        }

        .tabs { 
            display: flex; background: #e0e4eb; padding: 4px; border-radius: 12px; 
            margin: 10px auto; width: 100%; max-width: 400px; flex-shrink: 0;
        }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 11px; color: var(--azbt-blue); transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--azbt-maroon); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

        /* MAIN CARD - FILLS MIDDLE SPACE */
        .main-card { 
            background: var(--white); border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(35,54,93,0.1); 
            overflow: hidden; border-top: 4px solid var(--azbt-maroon); 
            flex-grow: 1; display: flex; flex-direction: column; min-height: 0;
        }

        .month-bar { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #fff; flex-shrink: 0; }
        .month-bar h2 { font-family: 'Playfair Display'; font-size: clamp(1rem, 4vw, 1.2rem); margin: 0; color: var(--azbt-blue); }
        .nav-arrow { background: var(--azbt-blue); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }

        /* SCROLLABLE VIEW MODES */
        #cal-mode { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .grid-wrapper { flex-grow: 1; overflow-y: auto; background: #eee; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; width: 100%; }
        
        .day-label { position: sticky; top: 0; z-index: 10; background: var(--white); font-size: 10px; font-weight: 800; color: var(--azbt-gold); padding: 8px 0; text-align: center; text-transform: uppercase; border-bottom: 1px solid #eee; }
        
        .cell { background: var(--white); height: clamp(70px, 12vh, 110px); padding: 4px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; overflow: hidden; cursor: pointer; }
        .cell.selected { background: #fff9ed; box-shadow: inset 0 0 0 1.5px var(--azbt-gold); z-index: 5; }
        .cell.today { background: #fdf8eb; }
        .cell.holiday { background: #fff8f8; }
        .cell.not-month { opacity: 0.1; pointer-events: none; }

        .date-num { font-size: 12px; font-weight: 800; color: var(--azbt-blue); margin-bottom: 2px; }
        .cell-do-tag { 
            display: inline-flex; align-items: center; gap: 2px;
            background: var(--azbt-blue); color: #fff;
            padding: 1px 4px; border-radius: 3px;
            font-size: 7px; font-weight: 700;
            border-left: 2px solid var(--azbt-gold);
            margin-bottom: 2px; width: fit-content;
        }
        .cell-scroll { flex-grow: 1; overflow-y: auto; font-size: 8px; line-height: 1.2; color: var(--azbt-maroon); font-weight: 600; }

        .detail-area { background: var(--azbt-light); padding: 12px; border-top: 2px solid var(--azbt-gold); flex-shrink: 0; min-height: 70px; text-align: left; }
        .detail-h { font-size: 12px; font-weight: 800; color: var(--azbt-blue); margin-bottom: 2px; }
        .detail-p { font-size: 10px; color: var(--azbt-maroon); line-height: 1.4; margin: 0; }

        #list-view { display: none; flex-grow: 1; overflow-y: auto; padding: 10px; }
        .list-card { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f0f0f0; background: #fff; margin-bottom: 8px; border-radius: 12px; text-align: left; }
        .list-card.is-today { background: #fffdf5; border: 1.5px solid var(--azbt-gold); }
        
        .badge { min-width: 42px; height: 42px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--azbt-gold); }
        .date-badge { background: var(--azbt-blue); color: var(--azbt-gold); margin-right: 12px; }
        .date-badge .d { font-size: 16px; font-weight: 800; line-height: 1; }
        .date-badge .w { font-size: 7px; text-transform: uppercase; }

        .list-info { flex: 1; padding: 0 10px; }
        .list-event { font-size: 11px; font-weight: 700; color: var(--azbt-blue); }
        .list-sub { font-size: 9px; color: var(--azbt-maroon); margin-top: 2px; font-style: italic; }

        /* STICKY BOTTOM BUTTON */
        .btn-wrap { margin-top: auto; padding-top: 15px; flex-shrink: 0; }
        .btn-portal { 
            display: inline-block; background: var(--azbt-blue); color: #fff; padding: 10px 25px; 
            border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 600; 
            transition: 0.3s; box-shadow: 0 4px 15px rgba(35, 54, 93, 0.2);
        }
        .btn-portal:hover { background: var(--azbt-maroon); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="title-wrap">
        <h1 class="main-heading"><i class="fa-solid fa-calendar-day"></i> Academic Calendar</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-cal" onclick="switchTab('cal')"><i class="fa-solid fa-calendar-days"></i> Calendar</button>
        <button class="tab-btn" id="btn-list" onclick="switchTab('list')"><i class="fa-solid fa-list-check"></i> Timeline</button>
    </div>

    <div class="main-card">
        <div class="month-bar">
            <button class="nav-arrow" onclick="moveMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="monthLabel"></h2>
            <button class="nav-arrow" onclick="moveMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div id="cal-mode">
            <div class="grid-wrapper">
                <div class="grid" id="grid"></div>
            </div>
            <div class="detail-area" id="detailArea"></div>
        </div>

        <div id="list-view">
            <div id="listContent"></div>
        </div>
    </div>

    <div class="btn-wrap">
        <a href="https://loyolazoology.wixsite.com/az-bt/student-timetable" target="_blank" class="btn-portal">
            Student Timetable Portal <i class="fa-solid fa-arrow-right" style="margin-left:5px; font-size:10px;"></i>
        </a>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgt5H7LNGG1CB06ocZIe15CiIYT5DALF5UuTDwGXHXg2zkb13-p8lv5cnPSuIA_e2qfYnjaKuE8SaX/pub?gid=1169802535&single=true&output=csv";
    
    let db = [];
    let curDate = new Date();
    const today = new Date();

    async function load() {
        try {
            const r = await fetch(CSV_URL);
            const t = await r.text();
            db = t.split('\n').slice(1).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    date: c[0]?.trim(), 
                    working: c[2]?.trim(), 
                    order: c[3]?.trim(), 
                    event: c[5]?.replace(/"/g,'').trim(), 
                    reason: c[6]?.replace(/"/g,'').trim() 
                };
            });
            render();
            autoHighlightToday();
        } catch(e) { console.error(e); }
    }

    function render() {
        const m = curDate.getMonth(), y = curDate.getFullYear();
        document.getElementById('monthLabel').innerText = curDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        renderGrid(m, y);
        renderList(m, y);
    }

    function renderGrid(m, y) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
        const start = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<start; i++) grid.innerHTML += `<div class="cell not-month"></div>`;

        for(let d=1; d<=days; d++) {
            const dStr = `${d.toString().padStart(2,'0')}-${(m+1).toString().padStart(2,'0')}-${y}`;
            const info = db.find(r => r.date === dStr);
            const isToday = today.getDate()===d && today.getMonth()===m && today.getFullYear()===y;
            const isHol = info?.working === 'No' || new Date(y,m,d).getDay() === 0;

            const cell = document.createElement('div');
            cell.className = `cell ${isToday ? 'today' : ''} ${isHol ? 'holiday' : ''}`;
            cell.id = `cell-${dStr}`;
            
            let doHtml = info?.order ? `<div class="cell-do-tag">Order: ${info.order}</div>` : '';
            
            cell.innerHTML = `
                <span class="date-num">${d}</span>
                ${doHtml}
                <div class="cell-scroll">${info?.event || info?.reason || ''}</div>
            `;
            cell.onclick = () => {
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
                cell.classList.add('selected');
                setDetail(info, dStr);
            };
            grid.appendChild(cell);
        }
    }

    function setDetail(info, date) {
        const area = document.getElementById('detailArea');
        if(!info) { area.innerHTML = `<div class="detail-h">${date}</div><p class="detail-p">No scheduled details for this date.</p>`; return; }
        area.innerHTML = `
            <div class="detail-h"><i class="fa-solid fa-circle-info"></i> ${date} | ${info.working === 'Yes' ? 'Working Day' : 'Holiday'}</div>
            <p class="detail-p">
                ${info.order ? `<strong>Day Order:</strong> ${info.order}<br>` : ''}
                ${info.event ? `<strong>Event:</strong> ${info.event}<br>` : ''}
                ${info.reason ? `<strong>Note:</strong> ${info.reason}` : ''}
            </p>
        `;
    }

    function renderList(m, y) {
        const cont = document.getElementById('listContent');
        cont.innerHTML = '';
        const days = new Date(y, m + 1, 0).getDate();

        for(let d=1; d<=days; d++) {
            const dStr = `${d.toString().padStart(2,'0')}-${(m+1).toString().padStart(2,'0')}-${y}`;
            const info = db.find(r => r.date === dStr);
            const dateObj = new Date(y, m, d);
            const isToday = today.getDate()===d && today.getMonth()===m && today.getFullYear()===y;

            const row = document.createElement('div');
            row.className = `list-card ${isToday ? 'is-today' : ''}`;
            if(isToday) row.id = "today-list-scroll";
            
            const eventText = info?.event || info?.reason || "Academic Day";
            
            row.innerHTML = `
                <div class="badge date-badge">
                    <div class="d">${d}</div>
                    <div class="w">${dateObj.toLocaleString('default', {weekday:'short'})}</div>
                </div>
                <div class="list-info">
                    <div class="list-event">${eventText}</div>
                    ${info?.event && info?.reason ? `<div class="list-sub">${info.reason}</div>` : ''}
                </div>
                ${info?.order ? `<div class="badge" style="background:#fff; min-width:45px;"><span style="font-size:7px; font-weight:800; color:gray;">ORDER</span><span style="font-size:14px; font-weight:900; color:var(--azbt-maroon);">${info.order}</span></div>` : '<div style="min-width:45px"></div>'}
            `;
            cont.appendChild(row);
        }
    }

    function autoHighlightToday() {
        const dStr = `${today.getDate().toString().padStart(2,'0')}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getFullYear()}`;
        const info = db.find(r => r.date === dStr);
        const cell = document.getElementById(`cell-${dStr}`);
        if(cell) { cell.classList.add('selected'); setDetail(info, dStr); }
    }

    function switchTab(t) {
        document.getElementById('cal-mode').style.display = t==='cal'?'flex':'none';
        document.getElementById('list-view').style.display = t==='list'?'block':'none';
        document.getElementById('btn-cal').className = `tab-btn ${t==='cal'?'active':''}`;
        document.getElementById('btn-list').className = `tab-btn ${t==='list'?'active':''}`;
        if(t === 'list') {
            setTimeout(() => {
                const target = document.getElementById('today-list-scroll');
                if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    }

    function moveMonth(dir) { curDate.setMonth(curDate.getMonth() + dir); render(); }

    load();
</script>
</body>
</html>
