<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ-BT | Video Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --azbt-blue: #23365D; --azbt-maroon: #6C232E; --azbt-gold: #D4A64A; --azbt-light: #F4F6F9; }
        
        body { margin: 0; background: transparent; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .container { 
            width: 95%; max-width: 800px; margin: auto; text-align: center; 
            display: flex; flex-direction: column;
            height: clamp(450px, 95vh, 700px); padding: 10px 0; box-sizing: border-box; position: relative;
        }
        
        .title-wrap { flex-shrink: 0; margin-bottom: 15px; position: relative; }
        h2 { font-family: 'Playfair Display', serif; color: var(--azbt-blue); margin: 0; font-size: clamp(1.2rem, 5vw, 1.6rem); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-wrap::after { content: ''; display: block; width: 40px; height: 3px; background: var(--azbt-maroon); margin: 8px auto 0; }

        /* SLIDER FRAME */
        .slider-frame { 
            overflow: hidden; position: relative; border-radius: 20px; background: #fff; 
            box-shadow: 0 10px 25px rgba(35, 54, 93, 0.12); flex-grow: 1; display: block; min-height: 0;
        }

        /* SIDE NAVIGATION (DESKTOP) */
        .side-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--azbt-blue); color: white; border: none; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; z-index: 20; display: none; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .side-nav:hover { background: var(--azbt-maroon); }
        .prev-side { left: -20px; } .next-side { right: -20px; }
        @media (min-width: 900px) { .side-nav { display: flex; } }

        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); width: 100%; height: 100%; }
        .slide { min-width: 100%; box-sizing: border-box; height: 100%; display: flex; flex-direction: column; }

        /* VIDEO BOX */
        .video-box { 
            width: 100%; height: clamp(200px, 45vh, 350px); 
            background: #000; position: relative; flex-shrink: 0;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .maroon-line { height: 4px; background: var(--azbt-maroon); width: 100%; flex-shrink: 0; }

        /* CONTENT */
        .content { padding: 20px; overflow-y: auto; flex-grow: 1; text-align: center; }
        .video-title { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 4vw, 1.3rem); font-weight: bold; color: var(--azbt-blue); margin-bottom: 8px; line-height: 1.3; }
        .video-desc { font-size: 13px; color: #555; line-height: 1.5; max-width: 600px; margin: 0 auto; }

        .skeleton { flex-grow: 1; background: #eee; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="title-wrap">
        <h2><i class="fa-solid fa-play-circle"></i> Video Highlights</h2>
    </div>

    <button class="side-nav prev-side" onclick="manualMove(-1)"><i class="fas fa-chevron-left"></i></button>
    <button class="side-nav next-side" onclick="manualMove(1)"><i class="fas fa-chevron-right"></i></button>
    
    <div id="loader" class="skeleton"></div>
    <div class="slider-frame" id="slider-frame" style="display:none;">
        <div class="slider-track" id="track"></div>
    </div>
</div>

<script>
// Load YouTube IFrame API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-7bhNpdoIsQm0puBcni24CQ3kycaqNBJg4OEn9Bjmiryjsn40i_rhVMhxgy7R_dRFkgkriRW97i_i/pub?gid=0&single=true&output=csv";

let currentIndex = 0;
let videoData = [];
let players = [];
let isVideoPlaying = false;
let manualOverride = false;
let autoInterval;

function getYTId(url) {
    if (!url) return null;
    const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([\w-]{11})/);
    return match ? match[1] : null;
}

// YT API Callback
function onYouTubeIframeAPIReady() {
    init();
}

async function init() {
    try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const rows = text.trim().split("\n").slice(1);
        
        const track = document.getElementById("track");
        const frame = document.getElementById("slider-frame");

        videoData = rows.map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            return { id: cols[0], title: cols[1], desc: cols[2], url: getYTId(cols[3])};
        }).filter(v => v.url);

        if (videoData.length === 0) {
            frame.innerHTML = `<div style="padding:40px; color:#666;">No videos available.</div>`;
            document.getElementById("loader").style.display = "none";
            frame.style.display = "block";
            return;
        }

        videoData.forEach((v, idx) => {
            const slide = document.createElement("div");
            slide.className = "slide";
            slide.innerHTML = `
                <div class="video-box">
                    <div id="player-${idx}"></div>
                </div>
                <div class="maroon-line"></div>
                <div class="content">
                    <div class="video-title">${v.title}</div>
                    ${v.desc ? `<div class="video-desc">${v.desc}</div>` : ''}
                </div>
            `;
            track.appendChild(slide);
        });

        document.getElementById("loader").style.display = "none";
        frame.style.display = "block";

        // Initialize Players
        videoData.forEach((v, idx) => {
            players[idx] = new YT.Player(`player-${idx}`, {
                videoId: v.url,
                events: { 'onStateChange': onPlayerStateChange }
            });
        });

        startAutoScroll();
        setupTouch();

    } catch (e) { console.error(e); }
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        isVideoPlaying = true;
    } else {
        isVideoPlaying = false;
    }
}

function startAutoScroll() {
    autoInterval = setInterval(() => {
        if (!isVideoPlaying && !manualOverride) {
            moveSlide(1);
        }
    }, 8000);
}

function moveSlide(dir) {
    const track = document.getElementById("track");
    currentIndex = (currentIndex + dir + videoData.length) % videoData.length;
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    
    // Pause all videos when sliding
    players.forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
}

function manualMove(dir) {
    manualOverride = true;
    moveSlide(dir);
    // Resume auto-scroll after 15s of inactivity
    setTimeout(() => { manualOverride = false; }, 15000);
}

function setupTouch() {
    const frame = document.getElementById("slider-frame");
    let startX = 0;
    frame.addEventListener('touchstart', e => { 
        startX = e.touches[0].clientX; 
        manualOverride = true;
    }, {passive: true});
    
    frame.addEventListener('touchend', e => {
        let endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) moveSlide(1);
        else if (endX - startX > 50) moveSlide(-1);
        
        setTimeout(() => { manualOverride = false; }, 15000);
    }, {passive: true});
}
</script>
</body>
</html>
